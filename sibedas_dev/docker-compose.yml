# docker-compose.yml - Production deployment for sibedaspbg.cloud

services:
    # ==========================================================
    # APP: PHP-FPM + Queue Workers + Scheduler (via Supervisord)
    # ==========================================================
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: production
        container_name: sibedas_app
        restart: unless-stopped
        environment:
            APP_NAME: ${APP_NAME:-Sibedas}
            APP_ENV: ${APP_ENV:-production}
            APP_DEBUG: ${APP_DEBUG:-false}
            APP_KEY: ${APP_KEY}
            APP_URL: ${APP_URL:-https://sibedaspbg.cloud}
            API_URL: ${API_URL:-https://sibedaspbg.cloud}
            APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Jakarta}

            LOG_CHANNEL: ${LOG_CHANNEL:-stack}
            LOG_LEVEL: ${LOG_LEVEL:-error}

            # Database
            DB_CONNECTION: ${DB_CONNECTION:-mysql}
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE:-sibedas}
            DB_USERNAME: ${DB_USERNAME:-sibedas_user}
            DB_PASSWORD: ${DB_PASSWORD}

            # Cache / Session / Queue (all using database driver)
            CACHE_STORE: ${CACHE_STORE:-database}
            SESSION_DRIVER: ${SESSION_DRIVER:-database}
            SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
            QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}

            # Mail
            MAIL_MAILER: ${MAIL_MAILER:-log}
            MAIL_HOST: ${MAIL_HOST:-}
            MAIL_PORT: ${MAIL_PORT:-587}
            MAIL_USERNAME: ${MAIL_USERNAME:-}
            MAIL_PASSWORD: ${MAIL_PASSWORD:-}
            MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
            MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@sibedaspbg.cloud}
            MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Sibedas}

            # Google APIs
            API_KEY_GOOGLE: ${API_KEY_GOOGLE:-}
            SPREAD_SHEET_ID: ${SPREAD_SHEET_ID:-}

            # OpenAI
            OPENAI_API_KEY: ${OPENAI_API_KEY:-}

            # Webhook
            WEBHOOK_SECRET: ${WEBHOOK_SECRET:-sibedas-webhook-secret}
        volumes:
            # Bind mounts: public/ and storage/ live on VPS filesystem
            - ./public:/var/www/public
            - ./storage:/var/www/storage
            - ./bootstrap/cache:/var/www/bootstrap/cache
        depends_on:
            db:
                condition: service_healthy
        networks:
            - sibedas_network
        healthcheck:
            test: ["CMD", "php", "-v"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 120s
        deploy:
            resources:
                limits:
                    memory: 1G
                    cpus: "1.0"
                reservations:
                    memory: 512M

    # ==========================================================
    # NGINX: SSL termination + static file serving + FastCGI proxy
    # ==========================================================
    nginx:
        build:
            context: ./docker/nginx
            dockerfile: Dockerfile
        container_name: sibedas_nginx
        restart: unless-stopped
        environment:
            DOMAIN: ${DOMAIN:-sibedaspbg.cloud}
        ports:
            - "${NGINX_HTTP_PORT:-80}:80"
            - "${NGINX_HTTPS_PORT:-443}:443"
        volumes:
            # Serve static files from the same public/ as the app
            - ./public:/var/www/public:ro
            # Let's Encrypt certs (obtained by certbot on VPS host)
            - /etc/letsencrypt:/etc/letsencrypt:ro
            # Certbot webroot for renewals
            - sibedas_certbot_www:/var/www/certbot
            # Nginx logs
            - sibedas_nginx_logs:/var/log/nginx
        depends_on:
            - app
        networks:
            - sibedas_network
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health-check"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        deploy:
            resources:
                limits:
                    memory: 256M
                    cpus: "0.5"

    # ==========================================================
    # DATABASE: MariaDB 10.6
    # ==========================================================
    db:
        image: mariadb:10.6
        container_name: sibedas_db
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE:-sibedas}
            MYSQL_USER: ${DB_USERNAME:-sibedas_user}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            # Named volume for persistent database data
            - sibedas_dbdata:/var/lib/mysql
            # Initial database dump (only runs on empty volume)
            - ./sibedas.sql:/docker-entrypoint-initdb.d/sibedas.sql:ro
            # MySQL tuning
            - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
            - sibedas_db_logs:/var/log/mysql
        networks:
            - sibedas_network
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "${DB_USERNAME:-sibedas_user}",
                    "-p${DB_PASSWORD}",
                ]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 90s
        deploy:
            resources:
                limits:
                    memory: 2G
                    cpus: "1.0"
                reservations:
                    memory: 512M

volumes:
    sibedas_dbdata:
        driver: local
    sibedas_certbot_www:
        driver: local
    sibedas_nginx_logs:
        driver: local
    sibedas_db_logs:
        driver: local

networks:
    sibedas_network:
        driver: bridge
        ipam:
            config:
                - subnet: 172.20.0.0/16
